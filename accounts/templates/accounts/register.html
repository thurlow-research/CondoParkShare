{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request access — CondoParkShare</title>
</head>
<body>
  <h1>Request access</h1>

  {# Privacy / lawful-basis notice — GDPR Art. 13 / CCPA §1798.100 disclosure #}
  <div role="note" class="privacy-notice">
    {{ form.privacy_notice.help_text }}
  </div>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit request</button>
  </form>
</body>
</html>

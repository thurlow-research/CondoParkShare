{% extends "base.html" %}

{% block title %}Message sent — CondoParkShare{% endblock %}

{% block content %}
<div style="max-width:520px">
  <div class="page-header">
    <h1>Message sent</h1>
  </div>

  <div class="alert alert-success" role="status">
    <span class="alert-icon" aria-hidden="true">&#10003;</span>
    <span>Your message has been relayed. The recipient will receive it by email and can reply via the secure link included in the message.</span>
  </div>

  <div style="margin-top:24px">
    <a href="{% url 'booking_detail' booking.pk %}" class="btn btn-ghost">Back to booking</a>
  </div>
</div>
{% endblock %}

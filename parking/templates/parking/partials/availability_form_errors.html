<div id="availability-form-errors" role="alert">
  {% for field in form %}
    {% for error in field.errors %}
      <p class="form-error">{{ field.label }}: {{ error }}</p>
    {% endfor %}
  {% endfor %}
  {% for error in form.non_field_errors %}
    <p class="form-error">{{ error }}</p>
  {% endfor %}
</div>

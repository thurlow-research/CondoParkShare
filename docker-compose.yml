services:
  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - internal
    # No ports binding — db is internal only. All access via web service.

  web:
    build: .
    restart: unless-stopped
    command: gunicorn parkshare.wsgi:application --bind 0.0.0.0:8000 --workers 4
    env_file:
      - .env
    depends_on:
      - db
    ports:
      # Nexus (front Caddy) terminates TLS and reverse-proxies to this host on :8001.
      # 8001 is free on both opus and faberix (8000 is taken on faberix by an MCP server).
      - "8001:8000"
    networks:
      - internal   # reach db
      - external   # host-published :8001 routes via this (non-internal) network

volumes:
  pgdata:

networks:
  internal:
    internal: true
  external:

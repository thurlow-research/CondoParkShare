services:
  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - internal
    # No ports binding — db is internal only. All access via web service.

  web:
    build: .
    restart: unless-stopped
    command: gunicorn parkshare.wsgi:application --bind 0.0.0.0:8000 --workers 4
    env_file:
      - .env
    depends_on:
      - db
    ports:
      # Nexus (front Caddy) terminates TLS and reverse-proxies to this host on :8001.
      # 8001 is free on both opus and faberix (8000 is taken on faberix by an MCP server).
      # Interface-scoped publish (ADR-002 Decision C / CPS#158): bind only the host's
      # private-segment IP via WEB_BIND_IP instead of the 0.0.0.0 wildcard, so plain
      # gunicorn on :8001 is not reachable on every interface (which would bypass the
      # TLS termination and security headers applied at Nexus). WEB_BIND_IP MUST be set
      # in .env on every deployment — if left empty, Docker falls back to the 0.0.0.0
      # wildcard and the exposure gap reopens.
      - "${WEB_BIND_IP}:8001:8000"
    volumes:
      # audit_logs is a named volume so the JSONL recovery sink (AUDIT_RECOVERY_LOG)
      # survives container restart/replacement. It is the only copy of audit records
      # that failed to reach the DB — ephemeral storage would silently lose them.
      - audit_logs:/app/logs
    networks:
      - internal   # reach db
      - external   # host-published :8001 routes via this (non-internal) network

volumes:
  pgdata:
  # Persisted sink for AUDIT_RECOVERY_LOG (JSONL). Must outlive the web container.
  audit_logs:

networks:
  internal:
    internal: true
  external:
